# User Profile — Travel Planner Design Project
# Discovered through tripmate collaboration, Mar-2026

identity:
  role: product designer & traveler
  language: bilingual (Chinese + English)
  context: building a Travel Planner tool (Claude Code + Notion MCP)

travel_interests:
  nature:
    description: "beauty of nature — coastlines, forests, mountains, wildlife"
    examples:
      - Big Sur coastal cliffs
      - Sequoia giant trees
      - Elephant seal rookeries
      - Golden Gate Bridge at sunset
  tech:
    description: "advancement of technology — AI companies, space, computing history"
    examples:
      - Anthropic HQ (Claude's home)
      - SpaceX headquarters
      - Computer History Museum
      - Stanford University
      - Griffith Observatory
  culture:
    description: "local culture that represents the spirit of a city — customs, food, activities, history"
    examples:
      - SF Chinatown (oldest in North America)
      - Mission District murals & Mexican food
      - Solvang Danish village
      - Santa Barbara Spanish colonial architecture
      - Grand Central Market (LA food diversity)

travel_pace:
  pois_per_day: [3, 5]
  description: "balanced — 3 minimum on transit days, 5 max on full days"

wishlist:
  - name_en: Golden Gate Bridge / Battery Spencer Viewpoint
    name_cn: 金门大桥 / Battery Spencer观景台
    priority: must_visit
  - name_en: Big Sur (Bixby Bridge + Pfeiffer Beach)
    name_cn: 大瑟尔（比克斯比桥 + 菲佛海滩）
    priority: must_visit
  - name_en: General Sherman Tree & Congress Trail
    name_cn: 谢尔曼将军树 & 国会小径
    priority: must_visit
  - name_en: Anthropic HQ
    name_cn: Anthropic总部
    priority: must_visit
  - name_en: Computer History Museum
    name_cn: 计算机历史博物馆
    priority: must_visit
  - name_en: Chinatown San Francisco
    name_cn: 旧金山唐人街
    priority: must_visit
  - name_en: Monterey Bay Aquarium
    name_cn: 蒙特雷湾水族馆
    priority: nice_to_have
  - name_en: Griffith Observatory
    name_cn: 格里菲斯天文台
    priority: nice_to_have
  - name_en: Solvang
    name_cn: 索尔万
    priority: nice_to_have
  - name_en: Hearst Castle
    name_cn: 赫斯特城堡
    priority: nice_to_have

dietary:
  preferences: ["local representative food", "Chinese cuisine", "Mexican food"]
  restrictions: []

accommodation:
  budget_tier: moderate
  preferences: ["clean", "close to next day route", "parking available"]

travel_style:
  daily_schedule: "08:30 departure, 22:00 return"
  pacing: "prefers balanced pace — avoids both burnout days and empty days"
  planning_approach: "data-driven, collaborative with teammates"
  validation: "uses multi-LLM review (Claude + Codex + Gemini) for cross-validation"
  output_preference: "structured data (YAML) + readable summary (MD)"
  food_interest: "values local/representative food over generic restaurants"

decision_making:
  style: collaborative
  teammates: true
  decision_tracking: "uses pending/confirmed/rejected status fields"
  risk_awareness: "appreciates proactive warnings (closures, weather, booking deadlines)"

product_context:
  project: TravelPlannerDesign
  goal: "lightweight tool converting travel plans into structured Notion notes"
  workflow: "Claude Code entry → collect info → YAML → Notion MCP → export"
  advantage: "lighter than learning Notion directly; YAML easier for Claude to analyze"
