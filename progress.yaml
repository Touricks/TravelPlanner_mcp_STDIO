  - Verify --bare flag exists on installed claude CLI (never tested at runtime)
  candidates:
  - id: cand-2026-04-05-subprocess-isolation-three-layers
    type: rule
    text: All subprocess spawns (claude -p, codex exec) must use three-layer defense
      — (1) cwd=tempfile.mkdtemp() per spawn, (2) _TRAVEL_PLANNER_SUBPROCESS env var
      recursion guard, (3) --bare on claude -p. Never spawn subprocesses in PROJECT_ROOT
      where .mcp.json lives.
    scope: global
    confidence: high
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
  - id: cand-2026-04-05-codex-exec-no-websearch
    type: fact
    text: codex exec (used by codex:rescue and review/codex_review.py) has tools allowlist
      of {Bash} only. WebSearch is structurally impossible. Search discovery must
      use /call-codex (sentinel:call-codex), not codex exec.
    subsystem: mcp_server
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  - id: cand-2026-04-05-search-transform-split
    type: fact
    text: Search tools use two-phase architecture — /call-codex for web search discovery
      (returns raw text), then claude -p --bare --json-schema for structured transformation.
      Search prompts must demand all grounded fields (bilingual names, coordinates,
      hours, source URLs) so transform does not hallucinate.
    subsystem: mcp_server
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  absorbed_to: CLAUDE.md/ARCHITECTURE.md
- date: '2026-04-06'
  title: 'feat5: Parallelize POI search with discover_poi_names + per-POI codex calls'
  status: absorbed
  session_report: docs/logs/feat/feat5_parallel_poi_search_20260406.md
  next_steps:
  - E2E test discover_poi_names + search_pois with real codex subprocess against a
    live trip
  - Tune CODEX_PER_POI_TIMEOUT_SECONDS (60s default may be conservative for complex
    POIs)
  - Consider applying same parallel pattern to search_restaurants and search_hotels
  - Update ARCHITECTURE.md tool count (18 → 19 tools, 7 → 9 resources)
  candidates:
  - id: cand-2026-04-06-mcp-server-19-tools-9-resources
    type: fact
    text: MCP server has 19 tools (added discover_poi_names) and 9 resources (added
      travel://session/{session_id}/poi-names and travel://session/{session_id}/poi-search-progress).
      discover_poi_names is a lightweight tool (~10s, no web search) that the agent
      calls before search_pois.
    subsystem: mcp_server
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  - id: cand-2026-04-06-parallel-codex-semaphore-pattern
    type: fact
    text: Server-side search parallelism uses asyncio.Semaphore(CODEX_PARALLEL_LIMIT)
      with asyncio.as_completed() for per-POI codex calls. Individual task failures
      catch Exception (not just SearchError) to prevent one subprocess crash from
      aborting all parallel tasks. Majority threshold (>=50% success) gates progression.
    subsystem: mcp_server
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  absorbed_to: CLAUDE.md/ARCHITECTURE.md
- date: '2026-04-06'
  title: 'feat7: Per-POI file isolation for search and transform pipeline'
  status: unprocessed
  session_report: docs/logs/feat/feat7_per_poi_pipeline_20260406.md
  next_steps:
  - Build live E2E test kit that drives full MCP workflow with real codex/claude
    subprocesses (feat8)
  - Apply per-POI pattern to search_restaurants and search_hotels if POI pipeline
    proves stable in production
  - Implement crash recovery — resume from persisted poi-raw/ files on restart
  - Update ARCHITECTURE.md tool count and search architecture description
  candidates:
  - id: cand-2026-04-06-per-poi-two-phase-fanout
    type: fact
    text: POI search uses two-phase fan-out — Phase 1 parallel codex search (sem=5)
      writes per-POI raw files to sessions/{sid}/poi-raw/, majority gate (>=50%),
      then Phase 2 parallel claude transform (sem=3) writes structured JSON to
      sessions/{sid}/poi-transforms/. Final merge produces poi-candidates.json
      (unchanged downstream schema).
    subsystem: mcp_server
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  - id: cand-2026-04-06-per-poi-retry-backoff
    type: rule
    text: Per-POI search retries once on SearchError with exponential backoff (1s, 2s).
      Per-POI transform retries once on any exception. Retry reads from persisted
      raw file, so no wasted search work on transform retry.
    scope: module
    confidence: med
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
  - id: cand-2026-04-06-separate-transform-semaphore
    type: fact
    text: Search and transform use separate semaphores — CODEX_PARALLEL_LIMIT (default 5)
      for codex exec processes, TRANSFORM_PARALLEL_LIMIT (default 3) for claude -p
      processes. Claude processes are heavier, so lower concurrency limit.
    subsystem: mcp_server
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
