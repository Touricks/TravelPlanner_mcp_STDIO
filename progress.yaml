- date: '2026-04-02'
  title: Full pipeline implementation — Sprint 1-3
  status: absorbed
  session_report: docs/sessions/2026-04-02-full-pipeline-implementation-sprint-1-3.md
  next_steps:
  - Run pipeline/run.sh against SF trip with claude -p to validate end-to-end
  - Test Notion publishing (Stage 6) with real Notion MCP
  - Test screenshot verification (Stage 7) with Playwright
  - Add Codex CLI integration test for Stage 5 soft review
  - Extend profile.yaml with actual user data (travel_pace, wishlist)
  candidates:
  - id: cand-2026-04-02-python-39-type-hint
    type: rule
    text: Use `from __future__ import annotations` and `Optional[X]` instead of `X
      | None` — system Python is 3.9
    scope: global
    confidence: high
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
  - id: cand-2026-04-02-claude-p-schema-limits
    type: fact
    text: 'claude -p --json-schema enforces output conformance at API level. Limits:
      ≤20 strict tools/request, ≤24 optional params across all strict schemas, ≤16
      anyOf unions. Each pipeline stage uses 1 schema with max 14 optional params.'
    subsystem: pipeline
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  - id: cand-2026-04-02-rule-engine-parent-child
    type: rule
    text: Time overlap checker must suppress parent-child relationships via parent_item_index.
      Nested activities are intentional overlaps, not violations.
    scope: module
    confidence: high
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
  - id: cand-2026-04-02-guardrails-belt-suspenders
    type: fact
    text: 'Guardrails use belt-and-suspenders: constraints in LLM prompt (Stage 3)
      for generation-time awareness, validated post-hoc by Python rule engine (Stage
      5) as hard gate.'
    subsystem: rules
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
- date: '2026-04-02'
